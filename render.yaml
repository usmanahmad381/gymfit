# Render blueprint for the GymFit agent server.
# Deploy: https://dashboard.render.com → New → Blueprint → pick this repo.
# Render reads this file, builds agent-server/, and runs the ChatKit server.
services:
  - type: web
    name: gymfit-agent
    runtime: python
    plan: free
    rootDir: agent-server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      # 3.14 is too new for host build images; 3.12 has wheels for every dep.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set these in the Render dashboard (Environment tab) — never commit them.
      - key: OPENAI_API_KEY
        sync: false
      - key: GYMFIT_VECTOR_STORE_ID
        sync: false
      # Comma-separated Vercel origin(s), e.g. https://gymfit.vercel.app
      - key: CHATKIT_ALLOWED_ORIGINS
        sync: false
